name: Python PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  verify-app:
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
      HF_KEY: ${{ secrets.HF_KEY }}
      BACKEND_MODE: ${{ secrets.BACKEND_MODE }}
      TRANSCRIBE_BACKEND: ${{ secrets.TRANSCRIBE_BACKEND }}
      WHISPER_MODEL_SIZE: ${{ secrets.WHISPER_MODEL_SIZE }}
      WHISPER_COMPUTE_TYPE: ${{ secrets.WHISPER_COMPUTE_TYPE }}
      WHISPER_BATCH_SIZE: ${{ secrets.WHISPER_BATCH_SIZE }}
      VECTOR_STORE: ${{ secrets.VECTOR_STORE }}
      LOCAL_MODEL: ${{ secrets.LOCAL_MODEL }}
      LOCAL_URL: ${{ secrets.LOCAL_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify Environment
        run: |
          if [ -z "$OPENAI_KEY" ]; then echo "Secret missing"; exit 1; fi

      - name: Background Start & Health Check
        run: |
          cd src
          # Start app in background
          python app.py &
          APP_PID=$!
          
          echo "Waiting for API to boot..."
          
          # Poll health route (max 30 seconds)
          TIMEOUT=30
          COUNT=0
          UP=0
          
          while [ $COUNT -lt $TIMEOUT ]; do
            if curl -s http://localhost:8000/general/status > /dev/null; then
              echo "API is UP!"
              UP=1
              break
            fi
            echo "Still waiting..."
            sleep 2
            COUNT=$((COUNT+2))
          done
          
          # Cleanup
          kill $APP_PID
          
          if [ $UP -eq 1 ]; then
            echo "Verification successful."
            exit 0
          else
            echo "API failed to start in time."
            exit 1
          fi